name: CameraViewer
options:
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
targets:
  CameraViewer:
    type: application
    platform: macOS
    sources:
      - path: CameraViewer
        excludes:
          - "Info.plist"
          - "CameraViewer.entitlements"
    # Explicit shared scheme so `xcodebuild test` always has a test action;
    # without this, regeneration leaves only a transient auto-created scheme.
    scheme:
      testTargets:
        - CameraViewerTests
    settings:
      base:
        # Source of truth for the app bundle name. Must live here (not just in the
        # generated pbxproj) so `xcodegen generate` doesn't revert it to "CameraViewer".
        PRODUCT_NAME: Camera Viewer
        # Keep the Swift module name a clean identifier; PRODUCT_NAME's space
        # would otherwise make it "Camera_Viewer" and break @testable import.
        PRODUCT_MODULE_NAME: CameraViewer
        PRODUCT_BUNDLE_IDENTIFIER: com.craigmdennis.cameraviewer
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        # Local/dev builds are ad-hoc signed ("-"). The notarized release path overrides
        # the identity at the command line (scripts/release.sh) once a Developer ID cert
        # exists — set DEVELOPMENT_TEAM here to your 10-char Team ID after enrolling.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        # DEVELOPMENT_TEAM: "XXXXXXXXXX"   # ← fill in after Apple Developer enrollment
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: CameraViewer/CameraViewer.entitlements
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: CameraViewer/Info.plist
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
  CameraViewerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: CameraViewerTests
    dependencies:
      - target: CameraViewer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.craigmdennis.cameraviewer.tests
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        GENERATE_INFOPLIST_FILE: YES
        # The app's PRODUCT_NAME has a space, so the auto-derived TEST_HOST
        # (which uses the target name) points at the wrong bundle. Pin it.
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Camera Viewer.app/Contents/MacOS/Camera Viewer"
        BUNDLE_LOADER: "$(TEST_HOST)"
